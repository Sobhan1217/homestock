name: homestock
description: Family household inventory & shopping list manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9
  firebase_crashlytics: ^3.4.18
  flutter_riverpod: ^2.5.1
  get_it: ^7.6.7
  go_router: ^13.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^6.6.0
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.0.0
  fl_chart: ^0.66.2
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  build_runner: ^2.4.9
  hive_generator: ^2.0.1
