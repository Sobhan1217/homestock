name: Build & Deploy HomeStock

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze
      
      - name: Run tests
        run: flutter test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Web
        run: flutter build web --release --no-pub
      
      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: homestock-web
          path: build/web/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: homestock-android
          path: build/app/outputs/flutter-apk/app-release.apk

  deploy-web:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/homestock_key.pem
          chmod 600 ~/.ssh/homestock_key.pem
          ssh -i ~/.ssh/homestock_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            cd ~/homestock
            git pull origin main
            docker build -t homestock-web .
            docker stop homestock || true
            docker rm homestock || true
            docker run -d --name homestock -p 80:80 --restart unless-stopped homestock-web
          ENDSSH

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Download Web Artifacts
        uses: actions/download-artifact@v3
        with:
          name: homestock-web
          path: ./web-build/
      
      - name: Download Android Artifacts
        uses: actions/download-artifact@v3
        with:
          name: homestock-android
          path: ./android-build/
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            ## Changes in this Release
            - Automated build and deployment
            - Web, Android builds included
            
            ### Downloads
            - [Android APK](./android-build/app-release.apk)
            - Web build available at [homestock.app](http://3.110.200.0)
          draft: false
          prerelease: false
